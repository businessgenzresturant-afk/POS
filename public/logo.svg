<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="256" cy="256" r="180" fill="rgba(255,255,255,0.05)"/>
  <circle cx="256" cy="256" r="140" fill="rgba(255,255,255,0.08)"/>
  
  <!-- Plate icon -->
  <circle cx="256" cy="240" r="120" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="8"/>
  
  <!-- Fork and Spoon crossed -->
  <g filter="url(#shadow)">
    <!-- Fork -->
    <rect x="200" y="180" width="8" height="120" fill="white" rx="4" transform="rotate(-25 204 240)"/>
    <rect x="196" y="175" width="4" height="40" fill="white" rx="2" transform="rotate(-25 198 195)"/>
    <rect x="204" y="175" width="4" height="40" fill="white" rx="2" transform="rotate(-25 206 195)"/>
    <rect x="212" y="175" width="4" height="40" fill="white" rx="2" transform="rotate(-25 214 195)"/>
    
    <!-- Spoon -->
    <ellipse cx="308" cy="190" rx="18" ry="24" fill="white" transform="rotate(25 308 190)"/>
    <rect x="304" y="210" width="8" height="120" fill="white" rx="4" transform="rotate(25 308 270)"/>
  </g>
  
  <!-- Gen-Z Text -->
  <text x="256" y="420" font-size="80" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif" letter-spacing="2">
    GEN-Z
  </text>
  <text x="256" y="470" font-size="36" font-weight="600" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Arial, sans-serif" letter-spacing="4">
    RESTAURANT
  </text>
</svg>
